name: Render Site

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: quarto-dev/quarto-actions/setup@v2
      - run: npm run build
      - run: python3 site/pre-render.py
      - run: cd site && quarto render
